<!DOCTYPE html>
<html>
<head>
<title>Selection Certificate</title>

<style>
body{
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg,#43e97b,#38f9d7);
    margin:0;
}

.certificate{
    width:700px;
    margin:60px auto;
    padding:40px;
    background:white;
    border:8px solid #2c3e50;
    border-radius:15px;
    text-align:center;
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

h1{
    font-size:32px;
    margin-bottom:20px;
}

.name{
    font-size:28px;
    font-weight:bold;
    color:#2c3e50;
    margin:20px 0;
    border-bottom:2px dashed #555;
    display:inline-block;
    padding:5px 20px;
}

button{
    margin-top:25px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    background:#2c3e50;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:black;
}
</style>

</head>

<body>

<div class="certificate">

<h1>Sports Team Selection Certificate</h1>

<p>This certificate is proudly presented to</p>

<div class="name" id="playerName">Player Name</div>

<p>for successfully submitting the Sports Team Selection Form.</p>

<p>The player is eligible for participation in the sports team selection process.</p>

<h3>Congratulations!</h3>

<button onclick="window.print()">Print Certificate</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(name){
    document.getElementById("playerName").textContent = name;
}
</script>

</body>
</html>
